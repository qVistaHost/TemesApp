<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"><title>Álbumes esenciales 1960–1989</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:#111114;color:#efe7d8;font-family:Georgia,serif;min-height:100%;min-height:-webkit-fill-available;-webkit-text-size-adjust:100%;text-size-adjust:100%}::-webkit-scrollbar{display:none}
#header{background:linear-gradient(180deg,#1f1620,#151116);padding:1.2rem 1rem .95rem;text-align:center;border-bottom:1px solid rgba(213,167,92,.18)}#header h1{font-size:1.75rem;color:#d5a75c;letter-spacing:.04em}#header p{font-size:.76rem;color:rgba(239,231,216,.38);margin-top:.25rem;font-style:italic;letter-spacing:.08em}
#nav{display:flex;overflow-x:auto;background:#0b0b0e;border-bottom:1px solid rgba(213,167,92,.1);-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior-x:contain;scroll-snap-type:x proximity}.nbtn{flex-shrink:0;padding:.58rem .78rem;border:none;background:transparent;color:rgba(239,231,216,.34);font-size:.76rem;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:Georgia,serif;transition:color .2s;scroll-snap-align:center;touch-action:manipulation}.nbtn.active{color:#d5a75c;border-bottom-color:#d5a75c}
#content{max-width:760px;margin:0 auto;padding:1.2rem 1rem 3rem}#era-badge{display:inline-block;border:1px solid rgba(213,167,92,.3);border-radius:20px;padding:.15rem .75rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#d5a75c;margin-bottom:.65rem}
#year-head{margin-bottom:1rem}#year-title-row{display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}#year-num{font-size:clamp(2rem,8vw,3rem);font-weight:bold;color:#d5a75c;line-height:1}
#summary-toggle{background:transparent;border:1px solid rgba(213,167,92,.35);color:#e9c98a;padding:.38rem .72rem;border-radius:999px;cursor:pointer;font-family:Georgia,serif;font-size:.73rem;letter-spacing:.04em}#summary-toggle:hover{background:rgba(213,167,92,.08)}
#year-summary{display:none;opacity:0;margin-top:0}#year-summary.open{display:block;opacity:1;margin-top:.9rem}
#year-summary-inner{border:1px solid rgba(213,167,92,.14);background:rgba(213,167,92,.05);border-radius:10px;padding:.95rem .95rem .2rem;max-height:360px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin;overscroll-behavior:contain}#year-summary-inner::-webkit-scrollbar{display:block;width:8px}#year-summary-inner::-webkit-scrollbar-thumb{background:rgba(213,167,92,.35);border-radius:8px}#year-summary-inner::-webkit-scrollbar-track{background:rgba(213,167,92,.08)}#year-summary p{font-size:.92rem;line-height:1.72;color:rgba(239,231,216,.84);margin-bottom:.8rem}
#divider{font-size:.68rem;color:rgba(239,231,216,.25);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.8rem;border-bottom:1px solid rgba(213,167,92,.1);padding-bottom:.5rem}
.event{display:grid;grid-template-columns:78px 1fr 20px;gap:.65rem;padding:.9rem .4rem;border-bottom:1px solid rgba(213,167,92,.09);cursor:pointer;border-radius:4px;transition:background .2s;touch-action:manipulation}.event.open{background:rgba(213,167,92,.05)}
.eyear{text-align:right;padding-top:.1rem;font-size:.76rem;font-weight:bold;color:#d5a75c;line-height:1.4}.etag{display:inline-block;padding:.1rem .4rem;border-radius:2px;font-size:.61rem;letter-spacing:.08em;text-transform:uppercase;font-weight:bold;margin-bottom:.25rem}.etitle{font-size:.94rem;font-weight:bold;color:#f4eddf;line-height:1.35}.eartist{font-size:.78rem;color:rgba(239,231,216,.58);margin-top:.18rem;letter-spacing:.03em}.edesc{font-size:.88rem;color:rgba(239,231,216,.68);line-height:1.65;margin-top:.45rem;display:none}.event.open .edesc{display:block}.eicon{color:rgba(213,167,92,.3);font-size:.95rem;padding-top:.1rem;transition:transform .2s;text-align:center}.event.open .eicon{transform:rotate(45deg);color:#d5a75c}
#navrow{display:flex;align-items:center;gap:.8rem;margin-top:2rem}.arrow{background:transparent;border:1px solid rgba(213,167,92,.4);color:#e9c98a;padding:.5rem .85rem;border-radius:2px;cursor:pointer;font-family:Georgia,serif;font-size:.84rem}.arrow:disabled{border-color:rgba(213,167,92,.15);color:rgba(213,167,92,.2);cursor:default}#prog-wrap{flex:1}#prog-bar{height:2px;background:rgba(213,167,92,.1);border-radius:1px}#prog-fill{height:100%;background:linear-gradient(90deg,#d5a75c,#edcf94);border-radius:1px;transition:width .35s}#prog-label{text-align:center;font-size:.66rem;color:rgba(239,231,216,.22);margin-top:.3rem;letter-spacing:.08em}
.t-jazz{background:rgba(79,118,164,.22);color:#9fc0f0}.t-rock{background:rgba(158,64,54,.22);color:#eea192}.t-pop{background:rgba(140,91,153,.22);color:#d3aae7}.t-soul{background:rgba(63,128,88,.22);color:#99d9ab}.t-folk{background:rgba(137,105,63,.22);color:#e3bf84}.t-electronic{background:rgba(63,128,137,.22);color:#92d8df}.t-reggae{background:rgba(88,131,55,.22);color:#afd97d}.t-punk{background:rgba(156,70,96,.22);color:#ee9db6}.t-metal{background:rgba(115,115,125,.22);color:#d0d3db}.t-hiphop{background:rgba(153,106,49,.22);color:#f0c27d}.t-alt{background:rgba(95,84,150,.22);color:#bdb0ff}
@media (max-width:640px){#content{padding:1rem .8rem 2.4rem}.event{grid-template-columns:64px 1fr 18px;padding:.82rem .2rem}.eyear{font-size:.72rem}.etitle{font-size:.92rem}.eartist{font-size:.76rem}.edesc{font-size:.86rem;line-height:1.58}#year-summary-inner{max-height:50svh}}</style></head>
<body><div id="header"><h1>Álbumes esenciales</h1><p>Año a año · 1960 — 1989</p></div><div id="nav"></div><div id="content"><div id="era-badge"></div><div id="year-head"><div id="year-title-row"><div id="year-num"></div><button id="summary-toggle" type="button" aria-expanded="false">Resumen del año ▾</button></div><div id="year-summary" aria-hidden="true"><div id="year-summary-inner"></div></div></div><div id="divider"></div><div id="events"></div><div id="navrow"><button class="arrow" id="prev">← Ant.</button><div id="prog-wrap"><div id="prog-bar"><div id="prog-fill"></div></div><div id="prog-label"></div></div><button class="arrow" id="next">Sig. →</button></div></div>
<script>
document.addEventListener('DOMContentLoaded', async ()=>{
const DATOS = await fetch('albums.json').then(r => {
  if (!r.ok) throw new Error('No se pudo cargar albums.json');
  return r.json();
});
const nav=document.getElementById('nav'), eraBadge=document.getElementById('era-badge'), yearNum=document.getElementById('year-num'), summaryToggle=document.getElementById('summary-toggle'), yearSummary=document.getElementById('year-summary'), yearSummaryInner=document.getElementById('year-summary-inner'), eventsEl=document.getElementById('events'), divider=document.getElementById('divider'), prevBtn=document.getElementById('prev'), nextBtn=document.getElementById('next'), progFill=document.getElementById('prog-fill'), progLabel=document.getElementById('prog-label'); let idx=0;
window.onerror = function(message, source, lineno, colno) { console.log('ERROR:', message, source, lineno, colno); };
function catClass(cat){ const c=cat.toLowerCase(); if(c.includes('hip hop')||c.includes('rap')) return 't-hiphop'; if(c.includes('metal')||c.includes('thrash')||c.includes('industrial')) return 't-metal'; if(c.includes('jazz')) return 't-jazz'; if(c.includes('soul')||c.includes('funk')||c.includes('r&b')) return 't-soul'; if(c.includes('folk')||c.includes('country')) return 't-folk'; if(c.includes('electronic')||c.includes('synth')||c.includes('ambient')) return 't-electronic'; if(c.includes('reggae')||c.includes('ska')) return 't-reggae'; if(c.includes('punk')) return 't-punk'; if(c.includes('alternative')||c.includes('new wave')||c.includes('post-punk')||c.includes('dream pop')||c.includes('shoegaze')) return 't-alt'; if(c.includes('pop')) return 't-pop'; return 't-rock'; }
function renderNav(){ nav.innerHTML=''; DATOS.años.forEach((item,i)=>{ const btn=document.createElement('button'); btn.className='nbtn'+(i===idx?' active':''); btn.textContent=item.año; btn.onclick=()=>{idx=i;render();}; nav.appendChild(btn); }); }
function render(){ const item=DATOS.años[idx]; renderNav(); eraBadge.textContent=item.era; yearNum.textContent=item.año; divider.textContent='10 álbumes esenciales del año'; yearSummary.classList.remove('open'); yearSummary.setAttribute('aria-hidden','true'); summaryToggle.setAttribute('aria-expanded','false'); summaryToggle.textContent='Resumen del año ▾'; yearSummaryInner.innerHTML=item.resumen.map(p=>`<p>${p}</p>`).join(''); eventsEl.innerHTML=item.eventos.map(ev=>`<div class="event"><div class="eyear">${ev.año}</div><div><div class="etag ${catClass(ev.cat)}">${ev.cat}</div><div class="etitle">${ev.titulo}</div><div class="eartist">${ev.artista}</div><div class="edesc">${ev.desc}</div></div><div class="eicon">+</div></div>`).join(''); document.querySelectorAll('.event').forEach(ev=>ev.addEventListener('click',()=>ev.classList.toggle('open'))); prevBtn.disabled=idx===0; nextBtn.disabled=idx===DATOS.años.length-1; progFill.style.width=`${((idx+1)/DATOS.años.length)*100}%`; progLabel.textContent=`${idx+1} / ${DATOS.años.length}`; }
summaryToggle.addEventListener('click',()=>{ const open=yearSummary.classList.toggle('open'); yearSummary.setAttribute('aria-hidden',String(!open)); summaryToggle.setAttribute('aria-expanded',String(open)); summaryToggle.textContent=open?'Ocultar resumen ▴':'Resumen del año ▾'; });
prevBtn.addEventListener('click',()=>{ if(idx>0){idx--;render();window.scrollTo({top:0,behavior:'smooth'});}});
nextBtn.addEventListener('click',()=>{ if(idx<DATOS.años.length-1){idx++;render();window.scrollTo({top:0,behavior:'smooth'});}});
render();
});
</script></body></html>
